name: Release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    environment: release
    # Prevent running on the version-bump commit that semantic-release itself pushes
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]')
    permissions:
      contents: write
      packages: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          # Full history is required — semantic-release reads every commit since
          # the last release tag to determine the next version.
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'
          cache: 'yarn'
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: HUSKY=0 yarn install --frozen-lockfile

      - name: Quality gate
        run: yarn quality

      - name: Release to npm and GitHub Releases
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          HUSKY: '0'
          NPM_CONFIG_PROVENANCE: 'true'
        run: yarn multi-semantic-release

      - name: Setup Node.js for GitHub Packages
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'
          registry-url: https://npm.pkg.github.com
          scope: '@graph-render'

      - name: Publish to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: node scripts/publish-github-packages.mjs
