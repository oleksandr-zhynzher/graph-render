name: Release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    # Prevent running on the version-bump commit that semantic-release itself pushes
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]')
    permissions:
      contents: write
      packages: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history is required — semantic-release reads every commit since
          # the last release tag to determine the next version.
          fetch-depth: 0
          # Prefer a PAT (GH_TOKEN) so the release commit can be pushed when
          # branch protection rules are enabled. Falls back to the built-in
          # GITHUB_TOKEN when GH_TOKEN has not been configured yet.
          token: ${{ secrets.GH_TOKEN || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: HUSKY=0 yarn install

      - name: Build all packages
        run: yarn build

      - name: Release to npm and GitHub Releases
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          HUSKY: '0'
        run: >-
          npx --yes
          -p multi-semantic-release@3.0.2
          -p semantic-release@24.2.0
          -p @semantic-release/changelog@6.0.3
          -p @semantic-release/commit-analyzer@13.0.0
          -p @semantic-release/git@10.0.1
          -p @semantic-release/github@11.0.0
          -p @semantic-release/npm@12.0.2
          -p @semantic-release/release-notes-generator@14.0.0
          multi-semantic-release

      - name: Format changelogs
        run: yarn prettier --write 'src/**/CHANGELOG.md'

      - name: Setup Node.js for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: https://npm.pkg.github.com
          scope: '@graph-render'

      - name: Publish to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
          NODE_AUTH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
        run: node scripts/publish-github-packages.mjs
