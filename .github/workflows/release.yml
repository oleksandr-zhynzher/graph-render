name: Release

on:
  push:
    branches:
      - main
      - master

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    # Prevent running on the version-bump commit that semantic-release itself pushes
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history is required — semantic-release reads every commit since
          # the last release tag to determine the next version.
          fetch-depth: 0
          # Prefer a PAT (GH_TOKEN) so the release commit can be pushed when
          # branch protection rules are enabled. Falls back to the built-in
          # GITHUB_TOKEN when GH_TOKEN has not been configured yet.
          token: ${{ secrets.GH_TOKEN || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        # HUSKY=0 prevents husky from installing git hooks in CI.
        run: HUSKY=0 yarn install --frozen-lockfile

      - name: Build all packages
        run: yarn build

      - name: Release
        env:
          # Prefer a PAT (GH_TOKEN) so semantic-release can push tags and the
          # version-bump commit even when branch protection rules are enabled.
          # Falls back to the built-in GITHUB_TOKEN when GH_TOKEN is not set.
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Disable husky so the machine-generated release commit is not linted.
          HUSKY: '0'
        run: npx multi-semantic-release
